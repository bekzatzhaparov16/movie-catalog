<div class="card" (click)="goToDetail()">
  <img
    [src]="tmdb.getPosterUrl(movie.poster_path)"
    [alt]="movie.title"
    class="poster"
  />
  <div class="info">
    <h3>{{ movie.title }}</h3>
    <div class="meta">
      <span class="rating">⭐ {{ movie.vote_average | number:'1.1-1' }}</span>
      <span class="year">{{ movie.release_date | date:'yyyy' }}</span>
    </div>
    <button class="fav-btn" (click)="toggleFav($event)">
      {{ isFav ? '❤️' : '🤍' }}
    </button>
  </div>
</div>
